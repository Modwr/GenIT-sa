<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-tag">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gen-IT | Generation Information Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="lang-en">
  <!-- ===== Header ===== -->
<header class="site-header">
  <div class="bar">
    <!-- تعديل المسار هنا ليتوافق مع اسم ملف اللوقو الخاص بك -->
    <a href="#" class="logo"><img src="logo.jpg" alt="Gen-IT"></a>
    <nav class="nav" id="nav-links"></nav>
    <div style="display:flex;align-items:center;gap:12px;">
      <button id="lang-switch" class="btn-lang">العربية</button>
    </div>
  </div>
</header>

  <!-- ===== Hero ===== -->
  <section class="hero">
    <div class="glow"></div>
    <div class="inner">
      <span class="badge">U-Connect with your future</span>
      <h1 id="hero-title"></h1>
      <p id="hero-desc"></p>
      <div class="hero-actions">
        <a href="#contact" id="hero-btn-primary" class="btn-primary"></a>
        <a href="#services" id="hero-btn-secondary" class="btn-ghost"></a>
      </div>
    </div>
  </section>

  <!-- ===== About ===== -->
  <section id="about" class="section bg-white">
    <div class="about-grid">
      <div class="about-text">
        <span id="about-tag" class="eyebrow"></span>
        <h2 id="about-title" class="section-title"></h2>
        <p id="about-p1"></p>
        <p id="about-p2"></p>
      </div>
      <div class="about-side">
        <div class="card">
          <h3 id="vision-title"></h3>
          <p id="vision-desc"></p>
        </div>
        <div class="card">
          <h3 id="mission-title"></h3>
          <p id="mission-desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== Services ===== -->
  <section id="services" class="section bg-slate">
    <div class="container center">
      <span id="services-tag" class="eyebrow"></span>
      <h2 id="services-title" class="section-title spaced"></h2>
    </div>
    <div class="grid-3" id="services-grid"></div>
  </section>

  <!-- ===== Goals ===== -->
  <section id="goals" class="section bg-dark">
    <div class="container center">
      <span id="goals-tag" class="eyebrow light"></span>
      <h2 id="goals-title" class="section-title spaced on-dark"></h2>
    </div>
    <div class="grid-goals" id="goals-grid"></div>
  </section>

  <!-- ===== Vendors ===== -->
  <section id="vendors" class="section bg-white">
    <div class="vendors-wrap">
      <div class="center">
        <span id="vendors-tag" class="eyebrow"></span>
        <h2 id="vendors-title" class="section-title spaced"></h2>
      </div>

      <div class="vendors-list">
        <div class="vendor-cat">
          <h3 id="vcat-1"></h3>
          <div class="badge-grid cols-auto">
            <div class="vendor-badge"><span style="color:#c8102e;font-weight:700;font-size:21px;letter-spacing:0.02em;">Ruijie</span></div>
            <div class="vendor-badge"><span style="color:#ff8300;font-weight:700;font-size:20px;">aruba</span></div>
            <div class="vendor-badge"><span style="color:#049fd9;font-weight:700;font-size:19px;letter-spacing:0.04em;">CISCO</span></div>
          </div>
        </div>

        <div class="vendor-cat">
          <h3 id="vcat-2"></h3>
          <div class="badge-grid cols-auto-sm">
            <div class="vendor-badge"><span style="color:#1e3a8a;font-weight:700;font-size:14px;letter-spacing:0.02em;">DATWYLER</span></div>
            <div class="vendor-badge"><span style="color:#15803d;font-weight:800;font-size:14px;">PANDUIT</span></div>
            <div class="vendor-badge"><span style="color:#ed1c24;font-weight:900;font-size:26px;">3M</span></div>
            <div class="vendor-badge"><span style="color:#1e3a8a;font-weight:900;font-size:16px;">BELDEN</span></div>
            <div class="vendor-badge"><span style="color:#0d9488;font-weight:700;font-size:12px;letter-spacing:-0.02em;">COMMSCOPE</span></div>
            <div class="vendor-badge"><span style="color:#1e293b;font-weight:400;font-size:17px;font-family:Georgia,serif;">CORNING</span></div>
          </div>
        </div>

        <div class="vendor-sub">
          <div class="vendor-cat sm">
            <h3 id="vcat-ip"></h3>
            <div class="badge-grid two">
              <div class="vendor-badge sm"><span style="color:#3b82f6;font-weight:700;font-size:11px;">GRANDSTREAM</span></div>
              <div class="vendor-badge sm"><span style="color:#10b981;font-weight:600;font-size:14px;">Yeastar</span></div>
            </div>
          </div>
          <div class="vendor-cat sm">
            <h3 id="vcat-3"></h3>
            <div class="badge-grid three">
              <div class="vendor-badge sm"><span style="color:#dc2626;font-weight:700;font-size:10.5px;">HIKVISION</span></div>
              <div class="vendor-badge sm"><span style="color:#f59e0b;font-weight:800;font-size:10px;">Honeywell</span></div>
              <div class="vendor-badge sm"><span style="color:#0f172a;font-weight:700;font-size:13px;">BOSCH</span></div>
            </div>
          </div>
          <div class="vendor-cat sm">
            <h3 id="vcat-ups"></h3>
            <div class="badge-grid three">
              <div class="vendor-badge sm"><span style="color:#b91c1c;font-weight:700;font-size:12px;">legrand</span></div>
              <div class="vendor-badge sm"><span style="color:#2563eb;font-weight:800;font-size:14px;">EATON</span></div>
              <div class="vendor-badge sm"><span style="color:#16a34a;font-weight:900;font-size:15px;">APC</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== Contact ===== -->
  <section id="contact" class="section bg-slate">
    <div class="contact-wrap">
      <div class="contact-head">
        <span id="contact-tag" class="eyebrow"></span>
        <h2 id="contact-title" class="section-title"></h2>
        <p id="contact-desc"></p>
      </div>

      <div id="sla-responder" class="sla hidden">
        <div class="row">
          <div class="ic"><i class="fas fa-check-circle"></i></div>
          <div>
            <h4 id="sla-title"></h4>
            <p id="sla-body"></p>
          </div>
        </div>
      </div>

      <div class="form-card">
        <form id="lead-form" action="https://formsubmit.co/ajax/info@genit-sa.com" method="POST">
          <input type="hidden" name="_subject" value="New lead from Gen-IT website">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_captcha" value="false">
          <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
          <div class="form-row">
            <div class="field">
              <label id="lbl-company" for="f-company"></label>
              <input id="f-company" type="text" name="company" required>
            </div>
            <div class="field">
              <label id="lbl-name" for="f-name"></label>
              <input id="f-name" type="text" name="name" required>
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label id="lbl-email" for="f-email"></label>
              <input id="f-email" type="email" name="email" required>
            </div>
            <div class="field">
              <label id="lbl-phone" for="f-phone"></label>
              <input id="f-phone" type="tel" name="phone" required placeholder="05xxxxxxxx">
            </div>
          </div>
          <div class="field">
            <label id="lbl-service" for="service-select"></label>
            <select id="service-select" name="service"></select>
          </div>
          <div class="field">
            <label id="lbl-msg" for="f-msg"></label>
            <textarea id="f-msg" rows="4" name="message"></textarea>
          </div>
          <button type="submit" id="btn-submit" class="btn-submit">
            <span id="btn-submit-text"></span>
            <i class="fas fa-circle-notch fa-spin hidden" id="btn-submit-spinner"></i>
          </button>
          <p id="form-error" class="form-error hidden"></p>
        </form>
      </div>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <img src="assets/logo-white.png" alt="Gen-IT">
    <p class="name">GENERATION INFORMATION TECHNOLOGY COMPANY</p>
    <p class="slogan">U-Connect with your future</p>
    <p class="copy">&copy; 2026 Gen-IT. <span id="footer-rights"></span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
