<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEN IT | جيل تقنية المعلومات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-700 antialiased selection:bg-[#0f172a] selection:text-white">

    <header class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="flex items-center space-x-2 space-x-reverse">
                <span class="text-2xl font-bold text-[#0f172a] tracking-wider font-[Poppins]">GEN <span class="text-blue-600">IT</span></span>
            </a>
            
            <nav class="hidden md:flex space-x-8 space-x-reverse text-sm font-semibold" id="nav-links">
                </nav>

            <div class="flex items-center space-x-4 space-x-reverse">
                <button id="lang-switch" class="bg-slate-50 hover:bg-slate-100 text-[#0f172a] border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold transition duration-300">
                    English
                </button>
                <a href="#contact" id="nav-cta" class="hidden md:block bg-[#0f172a] hover:bg-blue-900 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition duration-300 shadow-md">
                    طلب استشارة مجانية
                </a>
            </div>
        </div>
    </header>

    <section class="relative min-h-[85vh] pt-32 flex items-center justify-center overflow-hidden premium-hero-gradient text-white">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.05)_0,transparent_100%)]"></div>
        <div class="container mx-auto px-6 relative z-10 text-center max-w-4xl">
            <span class="inline-block bg-white/10 text-blue-300 text-xs font-bold px-4 py-2 rounded-full border border-white/10 mb-6 tracking-wider font-[Poppins]">
                U-Connect with your future
            </span>
            <h1 id="hero-title" class="text-4xl md:text-6xl font-bold leading-tight mb-6"></h1>
            <p id="hero-desc" class="text-slate-300 text-base md:text-lg mb-10 max-w-2xl mx-auto leading-relaxed"></p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <a href="#contact" id="hero-btn-primary" class="w-full sm:w-auto bg-white hover:bg-slate-100 text-[#0f172a] px-8 py-4 rounded-xl font-bold transition text-center shadow-lg"></a>
                <a href="#services" id="hero-btn-secondary" class="w-full sm:w-auto bg-white/10 hover:bg-white/20 border border-white/20 text-white px-8 py-4 rounded-xl font-semibold transition text-center"></a>
            </div>
        </div>
    </section>

    <section id="about" class="py-24 bg-white border-b border-slate-100">
        <div class="container mx-auto px-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                <div>
                    <span id="about-tag" class="text-blue-600 font-bold text-xs uppercase tracking-widest block mb-3"></span>
                    <h2 id="about-title" class="text-3xl font-bold text-[#0f172a] mb-6 tracking-tight"></h2>
                    <p id="about-p1" class="text-slate-500 leading-relaxed mb-6 text-sm md:text-base"></p>
                    <p id="about-p2" class="text-slate-500 leading-relaxed mb-8 text-sm md:text-base"></p>
                </div>
                <div class="space-y-6">
                    <div class="corporate-card p-8 rounded-2xl">
                        <h3 id="vision-title" class="text-lg font-bold text-[#0f172a] mb-3 flex items-center gap-3"></h3>
                        <p id="vision-desc" class="text-slate-500 text-sm leading-relaxed"></p>
                    </div>
                    <div class="corporate-card p-8 rounded-2xl">
                        <h3 id="mission-title" class="text-lg font-bold text-[#0f172a] mb-3 flex items-center gap-3"></h3>
                        <p id="mission-desc" class="text-slate-500 text-sm leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="services" class="py-24 bg-slate-50 border-b border-slate-100">
        <div class="container mx-auto px-6 text-center">
            <span id="services-tag" class="text-blue-600 font-bold text-xs uppercase tracking-widest block mb-3"></span>
            <h2 id="services-title" class="text-3xl font-bold text-[#0f172a] mb-16 tracking-tight"></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-right" id="services-grid">
                </div>
        </div>
    </section>

    <section id="goals" class="py-24 bg-[#0f172a] text-white border-b border-slate-100">
        <div class="container mx-auto px-6 text-center">
            <span id="goals-tag" class="text-blue-400 font-bold text-xs uppercase tracking-widest block mb-3"></span>
            <h2 id="goals-title" class="text-3xl font-bold text-white mb-16 tracking-tight"></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 text-right" id="goals-grid">
                </div>
        </div>
    </section>

    <section id="vendors" class="py-24 bg-white border-b border-slate-100">
        <div class="container mx-auto px-6 text-center">
            <span id="vendors-tag" class="text-blue-600 font-bold text-xs uppercase tracking-widest block mb-3"></span>
            <h2 id="vendors-title" class="text-3xl font-bold text-[#0f172a] mb-16 tracking-tight"></h2>

            <div class="space-y-8 max-w-5xl mx-auto">
                <div class="bg-slate-50 p-8 rounded-2xl border border-slate-100 text-right">
                    <h3 id="vcat-1" class="text-[#0f172a] font-bold mb-6 text-sm uppercase tracking-wider border-r-4 border-blue-600 pr-3"></h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                        <div class="vendor-badge">
                            <span class="text-red-600 font-bold text-xl tracking-wide font-[Poppins]">Ruijie</span>
                        </div>
                        <div class="vendor-badge">
                            <svg viewBox="0 0 100 40" class="h-10"><path d="M10,30 L25,5 L40,30 Z" fill="#FF8300"/><text x="45" y="25" font-family="sans-serif" font-weight="bold" font-size="14" fill="#000">aruba</text></svg>
                        </div>
                        <div class="vendor-badge">
                            <svg viewBox="0 0 40 40" class="h-12"><circle cx="20" cy="20" r="16" fill="none" stroke="#ED1C24" stroke-width="2"/><path d="M20,6 C25,12 25,28 20,34 C15,28 15,12 20,6 Z" fill="#ED1C24"/></svg>
                        </div>
                        <div class="vendor-badge">
                            <svg viewBox="0 0 60 40" class="h-10"><g fill="#049FD9"><rect x="5" y="15" width="3" height="10"/><rect x="12" y="10" width="3" height="20"/><rect x="19" y="5" width="3" height="30"/><rect x="26" y="10" width="3" height="20"/><rect x="33" y="15" width="3" height="10"/><rect x="40" y="5" width="3" height="30"/><rect x="47" y="15" width="3" height="10"/></g></svg>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-8 rounded-2xl border border-slate-100 text-right">
                    <h3 id="vcat-2" class="text-[#0f172a] font-bold mb-6 text-sm uppercase tracking-wider border-r-4 border-blue-600 pr-3"></h3>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4">
                        <div class="vendor-badge">
                            <span class="text-blue-800 font-bold text-sm">DATWYLER</span>
                        </div>
                        <div class="vendor-badge">
                            <span class="text-green-700 font-extrabold text-sm font-[Poppins]">PANDUIT</span>
                        </div>
                        <div class="vendor-badge">
                            <span class="text-red-600 font-black text-2xl font-[Poppins]">3M</span>
                        </div>
                        <div class="vendor-badge">
                            <span class="text-blue-900 font-black text-base font-[Poppins]">BELDEN</span>
                        </div>
                        <div class="vendor-badge">
                            <span class="text-teal-600 font-bold text-xs tracking-tight font-[Poppins]">COMMSCOPE</span>
                        </div>
                        <div class="vendor-badge">
                            <span class="text-slate-800 font-light text-base font-serif">CORNING</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-right">
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <h3 id="vcat-ip" class="text-[#0f172a] font-bold mb-4 text-xs uppercase tracking-wider border-r-4 border-blue-600 pr-3"></h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="vendor-badge !h-[75px]">
                                <span class="text-blue-500 font-bold text-xs">GRANDSTREAM</span>
                            </div>
                            <div class="vendor-badge !h-[75px]">
                                <span class="text-emerald-500 font-semibold text-sm">Yeastar</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <h3 id="vcat-3" class="text-[#0f172a] font-bold mb-4 text-xs uppercase tracking-wider border-r-4 border-blue-600 pr-3"></h3>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="vendor-badge !h-[75px] !p-1">
                                <span class="text-red-600 font-bold text-xs">HIKVISION</span>
                            </div>
                            <div class="vendor-badge !h-[75px] !p-1">
                                <span class="text-amber-500 font-extrabold text-xs">Honeywell</span>
                            </div>
                            <div class="vendor-badge !h-[75px] !p-1">
                                <span class="text-slate-900 font-bold text-sm">BOSCH</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <h3 id="vcat-ups" class="text-[#0f172a] font-bold mb-4 text-xs uppercase tracking-wider border-r-4 border-blue-600 pr-3"></h3>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="vendor-badge !h-[75px]">
                                <span class="text-red-700 font-bold text-xs">legrand</span>
                            </div>
                            <div class="vendor-badge !h-[75px]">
                                <span class="text-blue-600 font-extrabold text-sm">EATON</span>
                            </div>
                            <div class="vendor-badge !h-[75px]">
                                <span class="text-green-600 font-black text-sm">APC</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-24 bg-slate-50">
        <div class="container mx-auto px-6 max-w-4xl">
            <div class="text-center mb-12">
                <span id="contact-tag" class="text-blue-600 font-bold text-xs uppercase tracking-widest block mb-3"></span>
                <h2 id="contact-title" class="text-3xl font-bold text-[#0f172a] mb-4 tracking-tight"></h2>
                <p id="contact-desc" class="text-slate-500 text-sm"></p>
            </div>

            <div id="sla-responder" class="hidden mb-8 bg-blue-50 border border-blue-200 text-[#0f172a] p-6 rounded-2xl text-right transition-all duration-500 shadow-sm">
                <div class="flex items-start gap-4">
                    <div class="text-blue-600 text-2xl mt-1"><i class="fas fa-check-circle animate-pulse"></i></div>
                    <div>
                        <h4 id="sla-title" class="font-bold mb-2 text-sm text-[#0f172a]"></h4>
                        <p id="sla-body" class="text-slate-600 text-xs md:text-sm leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-3xl border border-slate-200/60 shadow-xl shadow-slate-100">
                <form id="lead-form" class="space-y-6" action="https://formsubmit.co/info@genit-sa.com" method="POST">
                    <input type="hidden" name="_subject" value="New lead from GEN-IT website">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label id="lbl-company" class="block text-slate-500 text-xs font-bold mb-2"></label>
                            <input type="text" name="company" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:border-[#0f172a] transition">
                        </div>
                        <div>
                            <label id="lbl-name" class="block text-slate-500 text-xs font-bold mb-2"></label>
                            <input type="text" name="name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:border-[#0f172a] transition">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label id="lbl-email" class="block text-slate-500 text-xs font-bold mb-2"></label>
                            <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:border-[#0f172a] transition">
                        </div>
                        <div>
                            <label id="lbl-phone" class="block text-slate-500 text-xs font-bold mb-2"></label>
                            <input type="tel" name="phone" required placeholder="05xxxxxxxx" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:border-[#0f172a] transition">
                        </div>
                    </div>
                    <div>
                        <label id="lbl-service" class="block text-slate-500 text-xs font-bold mb-2"></label>
                        <select id="service-select" name="service" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 text-sm focus:outline-none focus:border-[#0f172a] transition">
                            </select>
                    </div>
                    <div>
                        <label id="lbl-msg" class="block text-slate-500 text-xs font-bold mb-2"></label>
                        <textarea rows="4" name="message" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:border-[#0f172a] transition"></textarea>
                    </div>
                    <button type="submit" id="btn-submit" class="w-full bg-[#0f172a] hover:bg-blue-900 text-white font-bold py-4 rounded-xl transition shadow-md flex items-center justify-center gap-2">
                        <span id="btn-submit-text"></span>
                        <i class="fas fa-circle-notch fa-spin hidden" id="btn-submit-spinner"></i>
                    </button>
                    <p id="form-error" class="hidden text-red-600 text-xs text-center font-bold"></p>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-[#0f172a] py-12 text-center text-slate-400 text-xs">
        <p class="text-white font-bold tracking-wider font-[Poppins] text-sm">GENERATION INFORMATION TECHNOLOGY COMPANY</p>
        <p class="mt-2 font-[Poppins] text-blue-400 opacity-80">U-Connect with your future</p>
        <p class="mt-4 text-slate-500">&copy; 2026 GEN IT. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
